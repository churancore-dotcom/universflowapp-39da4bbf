name: Build Universe Flow APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform exists, skipping"
          fi

      - name: Copy native Kotlin files
        run: |
          PKG="android/app/src/main/java/com/universeflow/app"
          mkdir -p $PKG
          for f in MusicService.kt AudioFocusPlugin.kt MainActivity.kt; do
            if [ -f "android-native/$f" ]; then
              cp android-native/$f $PKG/$f
              echo "Copied $f"
            fi
          done

      - name: Fix duplicate INTERNET permission in manifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          # Remove duplicate INTERNET permission if exists
          python3 - <<'EOF'
import re
with open("android/app/src/main/AndroidManifest.xml", "r") as f:
    content = f.read()
# Remove duplicate permissions
seen = set()
lines = content.split('\n')
clean = []
for line in lines:
    stripped = line.strip()
    if 'uses-permission' in stripped:
        if stripped not in seen:
            seen.add(stripped)
            clean.append(line)
    else:
        clean.append(line)
with open("android/app/src/main/AndroidManifest.xml", "w") as f:
    f.write('\n'.join(clean))
print("Manifest cleaned")
EOF

      - name: Ensure required permissions in manifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          add_permission() {
            perm=$1
            if ! grep -q "$perm" $MANIFEST; then
              sed -i "s|<application|<uses-permission android:name=\"$perm\"/>\n    <application|" $MANIFEST
              echo "Added $perm"
            fi
          }
          add_permission "android.permission.FOREGROUND_SERVICE"
          add_permission "android.permission.FOREGROUND_SERVICE_MEDIA_PLAYBACK"
          add_permission "android.permission.WAKE_LOCK"
          add_permission "android.permission.ACCESS_WIFI_STATE"
          add_permission "android.permission.CHANGE_WIFI_STATE"
          add_permission "android.permission.SCHEDULE_EXACT_ALARM"

      - name: Ensure MusicService in manifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if ! grep -q "MusicService" $MANIFEST; then
            sed -i 's|</application>|<service android:name=".MusicService" android:foregroundServiceType="mediaPlayback" android:exported="false" android:stopWithTask="false"/>\n</application>|' $MANIFEST
            echo "Added MusicService to manifest"
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_FILE }}" | base64 -d > keystore.jks
          echo "Keystore size: $(wc -c < keystore.jks) bytes"

      - name: Verify keystore
        run: |
          keytool -list \
            -keystore keystore.jks \
            -storepass ${{ secrets.KEYSTORE_PASS }} \
            -alias ${{ secrets.KEY_ALIAS }}

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASS }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASS }}

      - name: Verify APK exists
        run: |
          ls -la android/app/build/outputs/apk/release/
          echo "APK built successfully!"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: universe-flow-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
